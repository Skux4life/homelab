apiVersion: v1
kind: Service
metadata:
  name: aliasvault
spec:
  selector:
    app: aliasvault
  ports:
  - name: email
    port: 25
    targetPort: 25
  - name: encrypted-email
    port: 587
    targetPort: 587
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
